<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1E3A5F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Microvison" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Microvison Service</title>
    <script>
      window.addEventListener('error', function(e) {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `
            <div style="padding: 20px; background: #fff5f5; border: 1px solid #feb2b2; border-radius: 8px; margin: 20px; font-family: sans-serif;">
              <h2 style="color: #c53030; margin-top: 0;">Frontend Runtime Error</h2>
              <p style="font-weight: bold; color: #742a2a;">${e.message}</p>
              <pre style="background: #edf2f7; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 13px;">Source: ${e.filename}:${e.lineno}:${e.colno}</pre>
            </div>
          `;
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `
            <div style="padding: 20px; background: #fff5f5; border: 1px solid #feb2b2; border-radius: 8px; margin: 20px; font-family: sans-serif;">
              <h2 style="color: #c53030; margin-top: 0;">Unhandled Promise Rejection</h2>
              <p style="font-weight: bold; color: #742a2a;">${e.reason ? (e.reason.message || e.reason) : 'Unknown error'}</p>
              <pre style="background: #edf2f7; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 13px;">${e.reason && e.reason.stack ? e.reason.stack : ''}</pre>
            </div>
          `;
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
